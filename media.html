<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Explore our media gallery featuring video showcases, audio samples, and client testimonials from our production studio.">

    <title>Media Gallery</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="top">
        <h1>Media Gallery</h1>
        <nav class="nav">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="media.html" class="active">Media</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    
   <main>
        <section id="videos">
            <h2>Video Showcase</h2>
            
            <figure>
                <video controls width="640" height="360" poster="images/video-placeholder1.jpg">
                    <source src="media/sample1.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                <figcaption>Project Alpha: Corporate Brand Story</figcaption>
            </figure>

            <figure>
                <video controls width="640" height="360" poster="images/video-placeholder2.jpg">
                    <source src="media/sample2.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                <figcaption>Project Beta: Creative Commercial Short</figcaption>
            </figure>
        </section>

        <section id="audio">
            <h2>Audio Sample</h2>
            <p>Listen to our audio production quality:</p>
            <figure>
                <audio controls>
                    <source src="media/sample-audio.mp3" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>
                <figcaption>Studio Voiceover & Sound Design Demo</figcaption>
            </figure>
        </section>

        <section id="location">
            <h2>Location</h2>
            <p>Visit our studio at 123 Media Street</p>
            <div class="map-container">
                <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3151.83543450937!2d144.9537353153166!3d-37.816279742021234!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6ad65d4c2b349649%3A0xb6899234e561db11!2sMedia%20St!5e0!3m2!1sen!2sus!4v1610000000000!5m2!1sen!2sus" 
                    width="600" height="450" style="border:0;" 
                    allowfullscreen="" loading="lazy"
                    title="Google Maps showing studio location">
                </iframe>
            </div>
        </section>

        <section id="testimonials">
            <h2>Client Testimonials</h2>
            <div class="testimonial-grid">
                <figure>
                    <img src="images/client1.jpg" alt="Portrait of Jane Doe, Marketing Director">
                    <blockquote>"Exceptional quality and professional service!"</blockquote>
                    <figcaption>— Jane Doe, TechCorp</figcaption>
                </figure>
                
                <figure>
                    <img src="images/client2.jpg" alt="Portrait of John Smith, Film Producer">
                    <blockquote>"The best audio engineering in the city."</blockquote>
                    <figcaption>— John Smith, IndieFilms</figcaption>
                </figure>
                <figure>
                    <img src="images/client3.jpg" alt="Portrait of Sarah Lee, Creative Lead">
                    <blockquote>"Incredible attention to detail!"</blockquote>
                    <figcaption>— Sarah Lee, DesignHub</figcaption>
                </figure>
            </div>
        </section>
    </main>
    
    <footer class="bottom">
        <address>
            <p>Email: <a href="mailto:contact@mediaproduction.com">contact@mediaproduction.com</a></p>
        </address>
        <p>&copy; 2026 Media Production Company. All rights reserved.</p>
    
    </footer>
</body>
</html>
